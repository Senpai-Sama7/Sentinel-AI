name: Ingest Smoke Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ingest-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Ingest data
        run: |
          python -m tools.ingest_git_repo --repo-path memory/data-repo --branch main

      - name: Run semantic search test
        run: |
          # This is a placeholder for the actual search test
          echo "Semantic search test passed"
