name: Helm CI

on:
  push:
    branches:
      - main
    paths:
      - 'helm/**'

jobs:
  helm-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: Lint Helm chart
        run: |
          helm lint helm/

      - name: Package Helm chart
        run: |
          helm package helm/
