name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Get version from pyproject.toml
        id: get_version
        run: |
          version=$(grep -oP 'version = "\K[^"]+' pyproject.toml)
          echo "::set-output name=version::$version"

      - name: Verify tag and version match
        run: |
          tag_version=${GITHUB_REF#refs/tags/v}
          if [ "$tag_version" != "${{ steps.get_version.outputs.version }}" ]; then
            echo "Error: Tag version ($tag_version) does not match pyproject.toml version (${{ steps.get_version.outputs.version }})."
            exit 1
          fi

      - name: Check for CHANGELOG entry
        run: |
          if ! grep -q "## [${{ steps.get_version.outputs.version }}]" CHANGELOG.md; then
            echo "Error: No CHANGELOG entry found for version ${{ steps.get_version.outputs.version }}."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: stjse/semantic-memory:${{ steps.get_version.outputs.version }}

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: Package Helm chart
        run: |
          helm package helm/ --version ${{ steps.get_version.outputs.version }} --app-version ${{ steps.get_version.outputs.version }}

      - name: Publish Helm chart
        uses: stefanprodan/helm-gh-pages@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
